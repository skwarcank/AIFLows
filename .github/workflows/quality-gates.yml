name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Typecheck, tests, build, and migration sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Supabase migration sanity check
        run: |
          test -d supabase/migrations
          test -n "$(find supabase/migrations -name '*.sql' -print -quit)"
          for file in supabase/migrations/*.sql; do
            echo "checking $file"
            grep -qiE 'create|alter|drop|insert|update|delete' "$file"
          done
